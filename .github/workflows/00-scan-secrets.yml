name: Leaked Secrets Scan

on:
  workflow_call:

jobs:
  TruffleHog:
    runs-on: ubuntu-latest
    steps:
      - name: ⬇ Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 🐷 TruffleHog OSS
        uses: trufflesecurity/trufflehog@v3.93.1
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
